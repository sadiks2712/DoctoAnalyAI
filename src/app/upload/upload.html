<div class="upload-wrapper">
  <div class="upload-card fade-up">

    <div class="upload-icon">📁</div>

    <h2>Upload Healthcare Dataset</h2>

    <p class="upload-sub">
      Upload your CSV file to analyze disease trends.
    </p>

    <label class="file-label">
      <input
        type="file"
        (change)="onFileSelected($event)"
        accept=".csv"
      />
      <span>Choose CSV File</span>
    </label>

    <button
      class="upload-btn"
      (click)="upload()"
      [disabled]="loading"
    >
      <span *ngIf="!loading">🚀 Upload & Analyze</span>
      <span *ngIf="loading">Uploading...</span>
    </button>

    <!-- ✅ SUCCESS ANIMATION -->
    <div class="success-box" *ngIf="showSuccess">
      <div class="checkmark"></div>
      <p>Upload Successful!</p>
    </div>

    <p class="message" *ngIf="message && !showSuccess">
      {{ message }}
    </p>

  </div>
</div>
