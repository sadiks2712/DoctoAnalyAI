<div class="upload-wrapper">
  <div class="upload-card fade-up">

    <div class="upload-icon">📁</div>

    <h2>Upload Healthcare Dataset</h2>

    <p class="upload-sub">
      Upload your CSV file to analyze disease trends.
    </p>

    <!-- File Upload -->
    <label class="file-label">
      <input
        type="file"
        (change)="onFileSelected($event)"
        accept=".csv"
      />
      <span>Choose CSV File</span>
    </label>

    <!-- ✅ Show Selected File Name -->
    @if (selectedFile) {
      <p class="selected-file">
        📄 {{ selectedFile.name }}
      </p>
    }

    <!-- Upload Button -->
    <button
      class="upload-btn"
      (click)="upload()"
      [disabled]="loading || !selectedFile"
    >
      @if (!loading) {
        <span>🚀 Upload & Analyze</span>
      }
      @if (loading) {
        <span>Uploading...</span>
      }
    </button>

    <!-- ✅ SUCCESS ANIMATION -->
    @if (showSuccess) {
      <div class="success-box">
        <div class="checkmark"></div>
        <p>Upload Successful!</p>
      </div>
    }

    <!-- Message -->
    @if (message && !showSuccess) {
      <p class="message">
        {{ message }}
      </p>
    }

  </div>
</div>
