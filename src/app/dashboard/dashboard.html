<div id="dashboard-report" class="dashboard-container">

  <!-- 🔴 Live Alert -->
  <div class="live-alert">
    🔴 LIVE HEALTH MONITOR
  </div>
  <button
  *ngIf="selectedDisease || selectedRegion"
  class="export-btn"
  (click)="resetFilters()">
  🔄 Reset Filters
</button>

  <!-- 🧠 Detected Columns -->
  <div *ngIf="summary?.detected_columns?.length">
    <h3 class="section-title">Detected Columns</h3>

    <div class="chip-container">
      <span class="chip" *ngFor="let col of summary.detected_columns">
        {{ col }}
      </span>
    </div>
  </div>

  <!-- ⭐ LOADING -->
  <div *ngIf="loading" class="skeleton-container">
    <div class="skeleton-card"></div>
    <div class="skeleton-card"></div>
  </div>

  <!-- ⭐ WARNING -->
  <div *ngIf="warningMessage && !loading" class="warning">
    ⚠️ {{ warningMessage }}
  </div>

  <!-- ⭐ NO DATA -->
  <div *ngIf="!loading && noData" class="no-data">
    📂 Upload dataset to view analytics
  </div>

  <!-- ⭐ MAIN CONTENT -->
  <div *ngIf="!loading && !noData" class="fade-in">

    <!-- ================= KPI GRID ================= -->
    <div class="kpi-grid">

      <div class="card">
        <h3>Total Records</h3>
        <p class="counter">{{ animatedTotal }}</p>
      </div>

      <div class="card">
        <h3>Average Age</h3>
        <p class="counter">{{ animatedAvgAge }}</p>
      </div>

    </div>

    <!-- ================= CHART GRID ================= -->
    <div class="chart-grid">

      <!-- Disease Chart -->
      <div class="chart-card" *ngIf="diseaseChartData">
        <h3>Disease Distribution</h3>
        <canvas
  *ngIf="diseaseChartData"
  baseChart
  [data]="diseaseChartData"
  [options]="diseaseChartOptions"
  [type]="diseaseChartType">
</canvas>
      </div>

      <!-- Region Chart -->
      <div class="chart-card" *ngIf="regionChartData">
        <h3>Region Distribution</h3>
        <canvas
  *ngIf="regionChartData"
  baseChart
  [data]="regionChartData"
  [options]="regionChartOptions"
  [type]="regionChartType">
</canvas>
      </div>

    </div>

  </div>
</div>
